<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eb-green: #1e3a2c; --eb-gold: #c5a059; }
        .bg-eb-green { background-color: var(--eb-green); }
        .text-eb-green { color: var(--eb-green); }
        .text-eb-gold { color: var(--eb-gold); }
        .border-eb-gold { border-color: var(--eb-gold); }
        body { font-family: 'Georgia', serif; }
        [x-cloak] { display: none !important; }
        .tab-active { border-bottom: 4px solid var(--eb-gold); color: var(--eb-green); font-weight: bold; background-color: #f9fafb; }
        .year-badge-black { border: 2px solid #000; color: #000; font-weight: bold; padding: 0.25rem 1rem; border-radius: 4px; }
        .map-container iframe { width: 100%; height: 400px; border: 0; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen" x-data="appData()" x-init="initApp()">

    <!-- MODAL DE MANUTENÇÃO -->
    <template x-if="maintenanceMode">
        <div class="fixed inset-0 z-[100] bg-eb-green flex flex-col items-center justify-center text-white p-6 text-center">
            <img src="brasao-lcm.png" alt="LCM" class="h-24 mb-8 bg-white rounded-full p-2">
            <h1 class="text-3xl font-bold uppercase mb-4 tracking-widest text-eb-gold">Site em Manutenção</h1>
            <p class="max-w-2xl text-lg italic mb-8">Portal em fase de remodelagem para o novo formato de Domínios Analíticos.</p>
            <div class="bg-green-900 p-6 rounded shadow-xl border border-eb-gold">
                <input type="password" x-model="passInput" placeholder="Senha" class="bg-white text-gray-900 px-4 py-2 rounded focus:outline-none">
                <button @click="unlock()" class="bg-eb-gold text-eb-green font-bold px-6 py-2 rounded ml-2 hover:bg-yellow-600 transition">Entrar</button>
            </div>
        </div>
    </template>

    <!-- NAVEGAÇÃO -->
    <nav class="bg-eb-green text-white border-b-2 border-eb-gold sticky top-0 z-50 shadow-xl" x-show="!maintenanceMode">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4 cursor-pointer" @click="view = 'home'">
                    <img src="brasao-lcm.png" alt="LCM" class="h-12 w-auto bg-white rounded-full p-0.5">
                    <div class="hidden lg:block leading-tight">
                        <h1 class="font-bold text-sm uppercase tracking-wide">Laboratório de Ciências Militares</h1>
                        <p class="text-[10px] tracking-widest text-eb-gold uppercase">Escola de Comando e Estado-Maior do Exército</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- Busca -->
                    <div class="relative hidden md:block">
                        <input type="text" x-model="searchQuery" :placeholder="t[lang].search_placeholder" class="bg-green-900 text-white text-xs rounded-full px-4 py-1.5 focus:ring-1 focus:ring-eb-gold w-40">
                    </div>
                    <!-- Idiomas -->
                    <div class="flex space-x-1">
                        <button @click="lang = 'pt'" class="px-2 py-1 text-xs border rounded" :class="lang === 'pt' ? 'bg-eb-gold' : ''">PT</button>
                        <button @click="lang = 'en'" class="px-2 py-1 text-xs border rounded" :class="lang === 'en' ? 'bg-eb-gold' : ''">EN</button>
                        <button @click="lang = 'es'" class="px-2 py-1 text-xs border rounded" :class="lang === 'es' ? 'bg-eb-gold' : ''">ES</button>
                    </div>
                    <button @click="toggleMaintenance()" class="text-eb-gold hover:text-white px-2"><i class="fa-solid fa-lock"></i></button>
                    <button class="md:hidden text-2xl" @click="mobileMenuOpen = !mobileMenuOpen"><i class="fa-solid fa-bars"></i></button>
                </div>
            </div>
            
            <!-- Menu Principal -->
            <div class="hidden md:flex justify-center mt-3 space-x-4 text-[10px] lg:text-[11px] font-bold uppercase tracking-widest border-t border-green-800 pt-3">
                <template x-for="(label, key) in t[lang].menu" :key="key">
                    <button @click="view = key" class="hover:text-eb-gold transition" :class="view === key ? 'text-eb-gold' : ''" x-text="label"></button>
                </template>
            </div>
        </div>
        
        <!-- Menu Mobile Overlay -->
        <div x-show="mobileMenuOpen" class="md:hidden bg-eb-green border-t border-green-800 p-4" x-transition x-cloak>
            <template x-for="(label, key) in t[lang].menu" :key="key">
                <button @click="view = key; mobileMenuOpen = false" class="block w-full text-left py-2 border-b border-green-900" x-text="label"></button>
            </template>
        </div>
    </nav>

    <!-- CONTEÚDO DINÂMICO -->
    <main x-show="!maintenanceMode" class="flex-grow">
        
        <!-- HOME -->
        <section x-show="view === 'home'" x-cloak class="animate-fadeIn">
            <!-- Carrossel de Notícias -->
            <div class="bg-gray-200 h-[400px] relative overflow-hidden flex items-center justify-center">
                <template x-for="(n, index) in news" :key="index">
                    <div x-show="activeSlide === index" class="absolute inset-0 bg-cover bg-center transition-opacity duration-1000" :style="`background-image: url('${n.image}')`">
                        <div class="absolute inset-0 bg-black/40 flex flex-col justify-end p-12 text-white">
                            <h2 class="text-3xl font-bold uppercase mb-2" x-text="n.title[lang]"></h2>
                            <p class="max-w-2xl" x-text="n.desc[lang]"></p>
                        </div>
                    </div>
                </template>
            </div>
            <!-- Apresentação Institucional -->
            <div class="container mx-auto px-6 py-16 max-w-4xl text-center">
                <h2 class="text-2xl font-bold text-eb-green uppercase mb-8 border-b-2 border-eb-gold inline-block pb-2" x-text="t[lang].about_title"></h2>
                <div class="text-gray-700 text-lg leading-relaxed italic" x-html="introText[lang]"></div>
            </div>
        </section>

        <!-- DOMÍNIOS ANALÍTICOS -->
        <section x-show="view === 'domains'" x-cloak class="py-12 bg-gray-50">
            <div class="container mx-auto px-6 max-w-6xl">
                <header class="text-center mb-12">
                    <h2 class="text-3xl font-bold text-eb-green uppercase" x-text="t[lang].menu.domains"></h2>
                    <div class="h-1 w-24 bg-eb-gold mx-auto mt-4"></div>
                </header>
                <div class="space-y-12">
                    <template x-for="dom in domains" :key="dom.id">
                        <div class="bg-white p-8 rounded shadow border-l-8 border-eb-gold">
                            <h3 class="text-xl font-bold text-eb-green uppercase mb-4" x-text="dom.title[lang]"></h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 border-t border-gray-100 pt-6">
                                <template x-for="r in getResearchersByDomain(dom.id)" :key="r.name">
                                    <div class="flex items-center p-3 bg-gray-50 rounded border border-gray-100">
                                        <i class="fa-solid fa-user-check text-eb-gold mr-3"></i>
                                        <span class="text-sm font-bold" x-text="r.name"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- PESQUISADORES (REESTRUTURADO) -->
        <section x-show="view === 'all_researchers'" x-cloak class="py-12 bg-gray-50">
            <div class="container mx-auto px-6 max-w-7xl">
                <!-- PESQUISADORES PLENOS -->
                <div class="mb-20">
                    <h3 class="text-2xl font-bold text-eb-green uppercase border-b-2 border-eb-gold pb-2 mb-10 flex items-center">
                        <i class="fa-solid fa-award text-eb-gold mr-4"></i> <span x-text="t[lang].cat_plenos"></span>
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                        <template x-for="r in getSortedResearchers('pleno')" :key="r.name">
                            <div class="bg-white p-6 rounded shadow-sm border-t-4 border-eb-green flex flex-col items-center group relative">
                                <div class="w-28 h-28 bg-gray-100 rounded-full mb-4 overflow-hidden border-2 border-eb-green">
                                    <img x-show="r.photo" :src="r.photo" class="w-full h-full object-cover">
                                    <div x-show="!r.photo" class="w-full h-full flex items-center justify-center bg-eb-green text-white font-bold text-xl" x-text="getInitials(r.name)"></div>
                                </div>
                                <h4 class="font-bold text-eb-green text-center text-lg leading-tight mb-2" x-text="r.name"></h4>
                                <p class="text-[10px] text-eb-gold font-bold uppercase text-center mb-4 tracking-widest" x-text="r.role[lang]"></p>
                                <div class="flex space-x-2 mt-auto">
                                    <a :href="r.lattes" target="_blank" class="text-[10px] font-bold text-blue-800 border border-blue-200 px-3 py-1 rounded-full hover:bg-blue-50">LATTES CV</a>
                                    <button @click="selectedBio = r; showBio = true" class="text-[10px] font-bold text-gray-600 border border-gray-200 px-3 py-1 rounded-full hover:bg-gray-50">BIO</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- PESQUISADORES -->
                <div>
                    <h3 class="text-2xl font-bold text-gray-700 uppercase border-b-2 border-gray-300 pb-2 mb-10 flex items-center">
                        <i class="fa-solid fa-users text-gray-400 mr-4"></i> <span x-text="t[lang].cat_researchers"></span>
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                        <template x-for="r in getSortedResearchers('pesquisador')" :key="r.name">
                            <div class="bg-white p-6 rounded shadow-sm border-t-4 border-gray-300 flex flex-col items-center opacity-90 group">
                                <div class="w-24 h-24 bg-gray-100 rounded-full mb-4 overflow-hidden border-2 border-gray-300">
                                    <img x-show="r.photo" :src="r.photo" class="w-full h-full object-cover">
                                    <div x-show="!r.photo" class="w-full h-full flex items-center justify-center bg-gray-300 text-white font-bold" x-text="getInitials(r.name)"></div>
                                </div>
                                <h4 class="font-bold text-gray-800 text-center leading-tight mb-2" x-text="r.name"></h4>
                                <p class="text-[10px] text-gray-500 font-bold uppercase text-center mb-4 tracking-widest" x-text="r.role[lang]"></p>
                                <div class="flex space-x-2 mt-auto">
                                    <a :href="r.lattes" target="_blank" class="text-[10px] font-bold text-blue-800 border border-blue-200 px-3 py-1 rounded-full">LATTES CV</a>
                                    <button @click="selectedBio = r; showBio = true" class="text-[10px] font-bold text-gray-600 border border-gray-200 px-3 py-1 rounded-full">BIO</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </section>

        <!-- NCNP (ANTIGA IC) -->
        <section x-show="view === 'ncnp'" x-cloak class="py-12 bg-white">
            <div class="container mx-auto px-6 max-w-6xl">
                <header class="text-center mb-10">
                    <h2 class="text-3xl font-bold text-eb-green uppercase" x-text="t[lang].menu.ncnp"></h2>
                    <p class="text-gray-500 italic mt-2" x-text="t[lang].ncnp_subtitle"></p>
                </header>
                <div class="flex justify-center space-x-4 mb-10">
                    <button @click="ncnpTab = 'coords'" class="px-6 py-2 rounded font-bold uppercase text-xs" :class="ncnpTab === 'coords' ? 'bg-eb-green text-white' : 'bg-gray-200 text-gray-600'">Coordenação</button>
                    <button @click="ncnpTab = 'docs'" class="px-6 py-2 rounded font-bold uppercase text-xs" :class="ncnpTab === 'docs' ? 'bg-eb-green text-white' : 'bg-gray-200 text-gray-600'">Documentos</button>
                    <button @click="ncnpTab = 'students'" class="px-6 py-2 rounded font-bold uppercase text-xs" :class="ncnpTab === 'students' ? 'bg-eb-green text-white' : 'bg-gray-200 text-gray-600'">Integrantes</button>
                </div>
                <div class="bg-gray-50 p-8 rounded min-h-[400px]">
                    <template x-if="ncnpTab === 'coords'">
                        <div class="grid md:grid-cols-3 gap-6">
                            <template x-for="c in ic.coords" :key="c.name">
                                <div class="bg-white p-6 rounded text-center border-t-4 border-blue-800 shadow-sm">
                                    <h4 class="font-bold text-eb-green" x-text="c.name"></h4>
                                    <p class="text-xs text-eb-gold font-bold uppercase mt-1" x-text="c.role[lang]"></p>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="ncnpTab === 'docs'">
                        <div class="space-y-4">
                            <template x-for="d in ic.docs" :key="d.title">
                                <div class="flex justify-between items-center bg-white p-4 rounded border">
                                    <span class="font-bold text-eb-green" x-text="d.title"></span>
                                    <a :href="d.link" class="text-xs bg-eb-green text-white px-4 py-2 rounded">BAIXAR</a>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- ACADÊMICO (TESES/DISSERTAÇÕES/TCC) -->
        <section x-show="view === 'theses'" x-cloak class="py-12 bg-gray-50">
            <div class="container mx-auto px-6 max-w-5xl">
                <h2 class="text-3xl font-bold text-eb-green uppercase text-center mb-12" x-text="t[lang].menu.theses"></h2>
                <template x-for="group in getStructuredTheses()" :key="group.year">
                    <div class="mb-12">
                        <div class="flex items-center mb-6">
                            <span class="year-badge-black" x-text="group.year"></span>
                            <div class="h-px bg-gray-300 flex-grow ml-4"></div>
                        </div>
                        <div class="grid gap-4">
                            <template x-for="doc in group.docs">
                                <div class="bg-white p-6 rounded shadow-sm border border-gray-200 flex justify-between items-center hover:border-eb-green transition">
                                    <div>
                                        <h4 class="font-bold text-eb-green text-lg" x-text="doc.title"></h4>
                                        <p class="text-[10px] text-gray-500 font-bold uppercase mt-1" x-text="doc.type"></p>
                                        <p class="text-sm text-gray-600 italic mt-1"><i class="fa-solid fa-user-graduate mr-2 text-eb-gold"></i><span x-text="doc.researcher"></span></p>
                                    </div>
                                    <a :href="doc.file_link" target="_blank" class="bg-eb-green text-white text-[10px] font-bold px-4 py-2 rounded hover:bg-green-800 transition">PDF</a>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- CONTATO -->
        <section x-show="view === 'contact'" x-cloak class="py-12 bg-white">
            <div class="container mx-auto px-6 max-w-6xl">
                <div class="grid md:grid-cols-2 gap-12 items-center">
                    <div>
                        <h2 class="text-3xl font-bold text-eb-green uppercase mb-6" x-text="t[lang].menu.contact"></h2>
                        <div class="space-y-6 text-gray-700">
                            <p class="flex items-start"><i class="fa-solid fa-location-dot mt-1 mr-4 text-eb-gold"></i><span><strong>ECEME</strong><br>Praça Gen. Tibúrcio, 125<br>Praia Vermelha - Urca<br>Rio de Janeiro - RJ, 22290-270</span></p>
                            <p class="flex items-center"><i class="fa-solid fa-envelope mr-4 text-eb-gold"></i> lcmeceme@gmail.com</p>
                            <p class="flex items-center"><i class="fa-solid fa-phone mr-4 text-eb-gold"></i> (21) 3543-3456</p>
                        </div>
                    </div>
                    <div class="map-container rounded overflow-hidden shadow-lg border border-gray-200">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3674.56!2d-43.16!3d-22.95!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjLCsDU3JzE0LjkiUyA0M8KwMDknNTAuMCJX!5e0!3m2!1spt-BR!2sbr!4v1600000000000"></iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- MODAL BIO -->
    <div x-show="showBio" class="fixed inset-0 z-[110] bg-black/80 flex items-center justify-center p-4" x-cloak>
        <div class="bg-white rounded-lg max-w-2xl w-full p-8 shadow-2xl relative">
            <button @click="showBio = false" class="absolute top-4 right-4 text-2xl text-gray-400 hover:text-red-600">&times;</button>
            <div class="flex items-center mb-6">
                <div class="w-20 h-20 bg-gray-100 rounded-full overflow-hidden border-2 border-eb-gold mr-4">
                    <img x-show="selectedBio.photo" :src="selectedBio.photo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 class="text-xl font-bold text-eb-green" x-text="selectedBio.name"></h3>
                    <p class="text-xs text-eb-gold font-bold uppercase" x-text="selectedBio.role ? selectedBio.role[lang] : ''"></p>
                </div>
            </div>
            <div class="text-gray-700 leading-relaxed text-sm italic border-l-4 border-eb-gold pl-4" x-text="selectedBio.bio ? selectedBio.bio[lang] : ''"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-eb-green text-white py-10 border-t-8 border-eb-gold mt-auto" x-show="!maintenanceMode">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-6 md:mb-0">
                <h5 class="text-eb-gold font-bold uppercase mb-1">Laboratório de Ciências Militares</h5>
                <p class="text-xs text-gray-400">Escola de Comando e Estado-Maior do Exército</p>
            </div>
            <div class="flex space-x-6 text-2xl mb-6 md:mb-0">
                <a href="https://www.linkedin.com/company/lcmeceme/" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin hover:text-eb-gold transition"></i></a>
                <a href="https://www.instagram.com/lcmeceme/" target="_blank" title="Instagram"><i class="fa-brands fa-instagram hover:text-eb-gold transition"></i></a>
                <a href="https://www.youtube.com/@Laborat%C3%B3riodeCi%C3%AAnciasMilitares" target="_blank" title="YouTube"><i class="fa-brands fa-youtube hover:text-eb-gold transition"></i></a>
                <a href="http://dgp.cnpq.br/dgp/espelhogrupo/1550449480693956" target="_blank" title="CNPq" class="flex items-center text-[10px] border px-2 py-1 rounded font-bold hover:bg-white hover:text-eb-green transition">CNPq</a>
            </div>
            <img src="https://api.visitorbadge.io/api/visitors?path=lcm-eceme.github.io&label=VISITAS&labelColor=%231e3a2c&countColor=%23c5a059&style=flat" />
        </div>
    </footer>

    <script>
        function appData() {
            return {
                lang: 'pt', view: 'home', maintenanceMode: false, passInput: '',
                mobileMenuOpen: false, activeSlide: 0, showBio: false, selectedBio: {},
                ncnpTab: 'coords', searchQuery: '',
                allResearchers: [], theses: [], news: [], ic: {}, introText: {},
                domains: [
                    { id: 1, title: { pt: "Domínio 1 - Ciência, Tecnologia e Inovação em Defesa", en: "Domain 1 - Science, Technology and Innovation in Defense", es: "Dominio 1 - Ciencia, Tecnología e Innovación en Defensa" } },
                    { id: 2, title: { pt: "Domínio 2 - Preparo e Emprego do Poder Militar: Prontidão e Capacidades de Defesa", en: "Domain 2 - Military Power Preparation and Employment", es: "Dominio 2 - Preparación y Empleo del Poder Militar" } },
                    { id: 3, title: { pt: "Domínio 3 - Análise e Prospecção do Ambiente Estratégico em Apoio à Decisão em Defesa", en: "Domain 3 - Strategic Environment Analysis and Prospecting", es: "Dominio 3 - Análisis y Prospección del Ambiente Estratégico" } }
                ],
                t: {
                    pt: { 
                        about_title: 'Apresentação Institucional', search_placeholder: 'Buscar...',
                        cat_plenos: 'Pesquisadores Plenos', cat_researchers: 'Pesquisadores',
                        ncnp_subtitle: 'Formação e Desenvolvimento de Novas Lideranças Científicas',
                        menu: { home: 'Início', domains: 'Domínios', emeritus: 'Eméritos', leadership: 'Coordenação', all_researchers: 'Pesquisadores', ncnp: 'NCNP', theses: 'Teses/Dissertações/TCC', publications: 'Produção', contact: 'Contato' }
                    },
                    en: { 
                        about_title: 'Institutional Presentation', search_placeholder: 'Search...',
                        cat_plenos: 'Senior Researchers', cat_researchers: 'Researchers',
                        menu: { home: 'Home', domains: 'Domains', emeritus: 'Emeritus', leadership: 'Leadership', all_researchers: 'Researchers', ncnp: 'NCNP', theses: 'Academic Works', publications: 'Production', contact: 'Contact' }
                    },
                    es: { 
                        about_title: 'Presentación Institucional', search_placeholder: 'Buscar...',
                        cat_plenos: 'Investigadores Plenos', cat_researchers: 'Investigadores',
                        menu: { home: 'Inicio', domains: 'Dominios', emeritus: 'Eméritos', leadership: 'Coordinación', all_researchers: 'Investigadores', ncnp: 'NCNP', theses: 'Tesis/Dissertaciones', publications: 'Producción', contact: 'Contacto' }
                    }
                },

                async initApp() {
                    await this.loadAll();
                    if(localStorage.getItem('lcm_maint') === 'on') this.maintenanceMode = true;
                    setInterval(() => { this.activeSlide = (this.activeSlide + 1) % (this.news.length || 1); }, 6000);
                },

                async loadAll() {
                    try {
                        const r = await fetch('./data_researchers.json?v=' + Date.now()); this.allResearchers = await r.json();
                        const th = await fetch('./data_theses.json?v=' + Date.now()); this.theses = await th.json();
                        const newsData = await fetch('./data_news.json?v=' + Date.now()); this.news = await newsData.json();
                        const icData = await fetch('./data_ic.json?v=' + Date.now()); this.ic = await icData.json();
                        const introData = await fetch('./data_intro.json?v=' + Date.now()); this.introText = await introData.json();
                    } catch(e) { console.error("Falha no carregamento dos dados", e); }
                },

                unlock() { if(this.passInput === 'LCM@2026') { this.maintenanceMode = false; localStorage.setItem('lcm_maint', 'off'); } },
                toggleMaintenance() { this.maintenanceMode = true; localStorage.setItem('lcm_maint', 'on'); },

                getSortedResearchers(category) {
                    let filtered = this.allResearchers.filter(r => {
                        let role = (r.role.pt || "").toLowerCase();
                        let isDr = (role.includes("doutor") || role.includes("phd")) && !role.includes("doutorando");
                        return category === 'pleno' ? isDr : !isDr;
                    });
                    return filtered.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
                },

                getResearchersByDomain(domId) {
                    return this.allResearchers.filter(r => r.domain_id === domId).sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
                },

                getStructuredTheses() {
                    const years = [...new Set(this.theses.map(t => t.year))].sort((a, b) => b - a);
                    return years.map(y => ({ year: y, docs: this.theses.filter(t => t.year === y) }));
                },

                getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase(); }
            }
        }
    </script>
</body>
