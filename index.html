<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eb-green: #1e3a2c; --eb-gold: #c5a059; }
        .bg-eb-green { background-color: var(--eb-green); }
        .text-eb-green { color: var(--eb-green); }
        .text-eb-gold { color: var(--eb-gold); }
        body { font-family: 'Georgia', serif; }
        [x-cloak] { display: none !important; }
        .tab-active { border-bottom: 4px solid var(--eb-gold); color: var(--eb-green); font-weight: bold; background-color: #f9fafb; }
        .year-badge-black { border: 2px solid #000; color: #000; font-weight: bold; padding: 0.2rem 0.8rem; border-radius: 4px; }
        .map-container iframe { width: 100%; height: 350px; border: 0; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen" x-data="appData()" x-init="initApp()">

    <!-- MANUTENÇÃO -->
    <template x-if="maintenanceMode">
        <div class="fixed inset-0 z-[100] bg-eb-green flex flex-col items-center justify-center text-white text-center p-6">
            <img src="brasao-lcm.png" class="h-20 mb-6 bg-white rounded-full p-2">
            <h1 class="text-2xl font-bold uppercase text-eb-gold mb-2">Portal em Atualização</h1>
            <p class="italic mb-8 opacity-80">Remodelagem para Domínios Analíticos em curso.</p>
            <div class="bg-green-900 p-4 rounded border border-eb-gold">
                <input type="password" x-model="passInput" placeholder="Senha" class="text-gray-900 px-3 py-1 rounded outline-none">
                <button @click="unlock()" class="bg-eb-gold text-eb-green px-4 py-1 rounded font-bold ml-2">Entrar</button>
            </div>
        </div>
    </template>

    <!-- HEADER & NAVEGAÇÃO -->
    <nav class="bg-eb-green text-white border-b-2 border-eb-gold sticky top-0 z-50 shadow-lg" x-show="!maintenanceMode">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'home'">
                <img src="brasao-lcm.png" class="h-10 bg-white rounded-full p-0.5">
                <div class="hidden lg:block leading-none">
                    <span class="block font-bold text-xs uppercase">Laboratório de Ciências Militares</span>
                    <span class="text-[9px] text-eb-gold uppercase tracking-tighter">Escola de Comando e Estado-Maior do Exército</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <!-- Bandeiras de Idioma -->
                <div class="flex space-x-2">
                    <button @click="lang = 'pt'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/br.png" class="h-4 w-6 rounded shadow-sm" alt="PT"></button>
                    <button @click="lang = 'en'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/us.png" class="h-4 w-6 rounded shadow-sm" alt="EN"></button>
                    <button @click="lang = 'es'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/es.png" class="h-4 w-6 rounded shadow-sm" alt="ES"></button>
                </div>
                <button @click="toggleMaintenance()" class="text-eb-gold"><i class="fa-solid fa-lock text-sm"></i></button>
                <button class="md:hidden" @click="mobileMenuOpen = !mobileMenuOpen"><i class="fa-solid fa-bars text-xl"></i></button>
            </div>
        </div>
        
        <!-- Menu Desktop -->
        <div class="hidden md:flex justify-center bg-green-950/30 py-2 space-x-5 text-[10px] font-bold uppercase tracking-wider border-t border-green-800">
            <template x-for="(label, key) in t[lang].menu" :key="key">
                <button @click="view = key" class="hover:text-eb-gold transition" :class="view === key ? 'text-eb-gold' : ''" x-text="label"></button>
            </template>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <main x-show="!maintenanceMode" class="flex-grow">
        
        <!-- HOME -->
        <section x-show="view === 'home'" x-cloak>
            <div class="bg-gray-200 h-[350px] relative overflow-hidden">
                <template x-for="(n, index) in news" :key="index">
                    <div x-show="activeSlide === index" class="absolute inset-0 bg-cover bg-center" :style="`background-image: url('${n.image}')`">
                        <div class="absolute inset-0 bg-black/40 flex flex-col justify-end p-10 text-white">
                            <h2 class="text-2xl font-bold uppercase" x-text="n.title[lang]"></h2>
                            <p class="max-w-xl text-sm" x-text="n.desc[lang]"></p>
                        </div>
                    </div>
                </template>
            </div>
            <div class="container mx-auto px-6 py-12 max-w-4xl text-center">
                <h2 class="text-xl font-bold text-eb-green uppercase border-b-2 border-eb-gold inline-block pb-1 mb-6">Apresentação</h2>
                <div class="text-gray-700 leading-relaxed italic text-base" x-html="introText[lang]"></div>
            </div>
        </section>

        <!-- DOMÍNIOS (GRID DE CARDS COMPLETOS) -->
        <section x-show="view === 'domains'" x-cloak class="py-10">
            <div class="container mx-auto px-4 max-w-7xl">
                <template x-for="dom in domains" :key="dom.id">
                    <div class="mb-16">
                        <h3 class="text-lg font-bold text-eb-green uppercase border-l-4 border-eb-gold pl-3 mb-8" x-text="dom.title[lang]"></h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            <template x-for="r in getResearchersByDomain(dom.id)" :key="r.name">
                                <div class="bg-white p-5 rounded shadow-sm border-t-4 border-eb-green flex flex-col items-center">
                                    <div class="w-20 h-20 bg-gray-100 rounded-full mb-3 overflow-hidden border">
                                        <img x-show="r.photo" :src="r.photo" class="w-full h-full object-cover">
                                        <div x-show="!r.photo" class="w-full h-full flex items-center justify-center bg-eb-green text-white font-bold" x-text="getInitials(r.name)"></div>
                                    </div>
                                    <h4 class="font-bold text-eb-green text-sm text-center leading-tight mb-1" x-text="r.name"></h4>
                                    <p class="text-[9px] text-eb-gold font-bold uppercase mb-4" x-text="r.role[lang]"></p>
                                    <div class="flex space-x-2">
                                        <a :href="r.lattes" target="_blank" class="text-[9px] font-bold border px-3 py-1 rounded-full">LATTES</a>
                                        <button @click="selectedBio = r; showBio = true" class="text-[9px] font-bold border px-3 py-1 rounded-full">BIO</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- COORDENAÇÃO (ORDEM ESPECÍFICA) -->
        <section x-show="view === 'leadership'" x-cloak class="py-10">
            <div class="container mx-auto px-4 max-w-7xl">
                <h2 class="text-2xl font-bold text-center text-eb-green uppercase mb-10">Corpo de Coordenação</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 justify-center">
                    <template x-for="c in coordinators" :key="c.name">
                        <div class="bg-white p-6 rounded shadow-sm border-t-4 border-eb-gold flex flex-col items-center">
                            <div class="w-24 h-24 bg-gray-100 rounded-full mb-4 overflow-hidden border-2 border-eb-gold">
                                <img :src="c.photo" class="w-full h-full object-cover">
                            </div>
                            <h4 class="font-bold text-eb-green text-lg text-center" x-text="c.name"></h4>
                            <p class="text-xs text-eb-gold font-bold uppercase mt-1 mb-4" x-text="c.role[lang]"></p>
                            <div class="flex space-x-2">
                                <a :href="c.lattes" target="_blank" class="text-[10px] font-bold border px-4 py-1 rounded-full">LATTES CV</a>
                                <button @click="selectedBio = c; showBio = true" class="text-[10px] font-bold border px-4 py-1 rounded-full">BIO</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- PRODUÇÃO CIENTÍFICA (LISTAGEM POR ANO) -->
        <section x-show="view === 'publications'" x-cloak class="py-10 bg-white">
            <div class="container mx-auto px-4 max-w-5xl">
                <template x-for="group in getStructuredPubs()" :key="group.year">
                    <div class="mb-10">
                        <div class="flex items-center mb-6">
                            <span class="year-badge-black" x-text="group.year"></span>
                            <div class="h-px bg-gray-200 flex-grow ml-4"></div>
                        </div>
                        <div class="space-y-4">
                            <template x-for="p in group.docs" :key="p.title">
                                <div class="p-4 border rounded hover:shadow-md transition">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-bold text-eb-green text-base leading-tight pr-4" x-text="p.title"></h4>
                                        <a :href="p.link" target="_blank" class="text-red-600 text-xl"><i class="fa-solid fa-file-pdf"></i></a>
                                    </div>
                                    <p class="text-xs text-gray-600 mt-2"><span class="font-bold">Autores:</span> <span x-text="p.authors"></span></p>
                                    <p class="text-[10px] text-gray-400 italic mt-1" x-text="p.journal"></p>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- NCNP (FUNCIONALIDADE IC COMPLETA) -->
        <section x-show="view === 'ncnp'" x-cloak class="py-10">
            <div class="container mx-auto px-4 max-w-6xl">
                <div class="flex justify-center space-x-2 mb-8">
                    <button @click="ncnpTab = 'coords'" class="px-4 py-2 text-[10px] font-bold uppercase border" :class="ncnpTab === 'coords' ? 'bg-eb-green text-white' : ''">Coordenação</button>
                    <button @click="ncnpTab = 'docs'" class="px-4 py-2 text-[10px] font-bold uppercase border" :class="ncnpTab === 'docs' ? 'bg-eb-green text-white' : ''">Documentos</button>
                    <button @click="ncnpTab = 'students'" class="px-4 py-2 text-[10px] font-bold uppercase border" :class="ncnpTab === 'students' ? 'bg-eb-green text-white' : ''">Integrantes</button>
                </div>
                <div class="bg-white p-6 rounded border shadow-inner min-h-[300px]">
                    <template x-if="ncnpTab === 'coords'">
                        <div class="grid md:grid-cols-3 gap-6">
                            <template x-for="c in ic.coords" :key="c.name">
                                <div class="text-center p-4 border rounded bg-gray-50">
                                    <h4 class="font-bold text-eb-green" x-text="c.name"></h4>
                                    <p class="text-[10px] text-eb-gold font-bold uppercase" x-text="c.role[lang]"></p>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="ncnpTab === 'docs'">
                        <div class="space-y-3">
                            <template x-for="d in ic.docs" :key="d.title">
                                <div class="flex justify-between items-center p-3 border-b">
                                    <span class="text-sm font-bold text-eb-green" x-text="d.title"></span>
                                    <a :href="d.link" class="text-xs bg-eb-gold text-eb-green px-3 py-1 rounded font-bold">PDF</a>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- EVENTOS (RESTAURADO) -->
        <section x-show="view === 'events'" x-cloak class="py-10">
            <div class="container mx-auto px-4 max-w-4xl">
                <template x-for="e in events" :key="e.id">
                    <div class="flex mb-8 bg-white rounded border overflow-hidden">
                        <div class="bg-eb-green text-white p-4 flex flex-col items-center justify-center w-24">
                            <span class="text-2xl font-bold" x-text="e.day"></span>
                            <span class="text-[10px] uppercase font-bold" x-text="e.month[lang]"></span>
                        </div>
                        <div class="p-4 flex-grow">
                            <h4 class="font-bold text-eb-green uppercase" x-text="e.title[lang]"></h4>
                            <p class="text-xs text-gray-600 mt-1" x-text="e.desc[lang]"></p>
                            <div class="mt-3 flex justify-between items-center">
                                <span class="text-[10px] font-bold text-eb-gold" x-text="e.time"></span>
                                <span class="text-[9px] border px-2 py-0.5 rounded font-bold uppercase" :class="e.active ? 'text-green-600' : 'text-red-600'" x-text="e.active ? 'Aberto' : 'Encerrado'"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- EMÉRITOS (RESTAURADO) -->
        <section x-show="view === 'emeritus'" x-cloak class="py-10">
            <div class="container mx-auto px-4 max-w-5xl">
                <template x-for="group in getStructuredEmeritus()" :key="group.year">
                    <div class="mb-10">
                        <div class="flex items-center mb-6"><span class="bg-eb-gold px-3 py-1 text-xs font-bold rounded" x-text="group.year"></span><div class="h-px bg-gray-200 flex-grow ml-4"></div></div>
                        <div class="grid md:grid-cols-2 gap-4">
                            <template x-for="r in group.researchers" :key="r.name">
                                <div class="bg-white p-4 rounded border flex items-center">
                                    <div class="w-12 h-12 bg-gray-100 rounded-full mr-4 flex-shrink-0 border"></div>
                                    <div><h4 class="font-bold text-eb-green text-sm" x-text="r.name"></h4><p class="text-[10px] italic text-gray-500" x-text="r.bio[lang]"></p></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="bg-eb-green text-white py-8 border-t-4 border-eb-gold mt-auto" x-show="!maintenanceMode">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left text-[10px] opacity-60">
                <p class="font-bold">LCM © 2026 - PPGCM / ECEME</p>
                <p>Escola de Comando e Estado-Maior do Exército</p>
            </div>
            <div class="flex space-x-4 my-4 md:my-0">
                <a href="https://www.linkedin.com/company/lcmeceme/" class="hover:text-eb-gold"><i class="fa-brands fa-linkedin text-xl"></i></a>
                <a href="https://www.instagram.com/lcmeceme/" class="hover:text-eb-gold"><i class="fa-brands fa-instagram text-xl"></i></a>
                <a href="http://dgp.cnpq.br/dgp/espelhogrupo/1550449480693956" class="text-[10px] border px-2 py-1 rounded font-bold hover:bg-white hover:text-eb-green transition">CNPQ</a>
            </div>
            <img src="https://api.visitorbadge.io/api/visitors?path=lcm-eceme.github.io&label=VISITAS&labelColor=%231e3a2c&countColor=%23c5a059&style=flat" />
        </div>
    </footer>

    <!-- MODAL BIO -->
    <div x-show="showBio" class="fixed inset-0 z-[110] bg-black/70 flex items-center justify-center p-4" x-cloak>
        <div class="bg-white rounded-lg max-w-xl w-full p-6 shadow-2xl relative">
            <button @click="showBio = false" class="absolute top-2 right-2 text-xl">&times;</button>
            <h3 class="font-bold text-eb-green text-lg mb-4" x-text="selectedBio.name"></h3>
            <p class="text-sm italic text-gray-700 leading-relaxed" x-text="selectedBio.bio ? selectedBio.bio[lang] : ''"></p>
        </div>
    </div>

    <script>
        function appData() {
            return {
                lang: 'pt', view: 'home', maintenanceMode: false, passInput: '',
                activeSlide: 0, mobileMenuOpen: false, showBio: false, selectedBio: {},
                ncnpTab: 'coords', allResearchers: [], theses: [], publications: [], 
                news: [], ic: {}, introText: {}, events: [], emeritus: [], coordinators: [],
                domains: [
                    { id: 1, title: { pt: "Domínio 1 - Ciência, Tecnologia e Inovação em Defesa", en: "Domain 1 - Defense S&T", es: "Dominio 1 - CT&I" } },
                    { id: 2, title: { pt: "Domínio 2 - Preparo e Emprego do Poder Militar", en: "Domain 2 - Readiness", es: "Dominio 2 - Preparación" } },
                    { id: 3, title: { pt: "Domínio 3 - Análise e Prospecção do Ambiente Estratégico", en: "Domain 3 - Analysis", es: "Dominio 3 - Análisis" } }
                ],
                t: {
                    pt: { menu: { home: 'Início', domains: 'Domínios', emeritus: 'Eméritos', leadership: 'Coordenação', all_researchers: 'Pesquisadores', ncnp: 'NCNP', theses: 'Acadêmico', publications: 'Produção', contact: 'Contato', events: 'Eventos' } },
                    en: { menu: { home: 'Home', domains: 'Domains', emeritus: 'Emeritus', leadership: 'Leadership', all_researchers: 'Researchers', ncnp: 'NCNP', theses: 'Thesis', publications: 'Production', contact: 'Contact', events: 'Events' } },
                    es: { menu: { home: 'Inicio', domains: 'Dominios', emeritus: 'Eméritos', leadership: 'Coordinación', all_researchers: 'Investigadores', ncnp: 'NCNP', theses: 'Tesis', publications: 'Producción', contact: 'Contacto', events: 'Eventos' } }
                },
                async initApp() {
                    await this.loadAll();
                    if(localStorage.getItem('lcm_maint') === 'on') this.maintenanceMode = true;
                    setInterval(() => { this.activeSlide = (this.activeSlide + 1) % (this.news.length || 1); }, 6000);
                },
                async loadAll() {
                    const endpoints = [
                        ['allResearchers', './data_researchers.json'], ['theses', './data_theses.json'],
                        ['publications', './data_publications.json'], ['news', './data_news.json'],
                        ['ic', './data_ic.json'], ['introText', './data_intro.json'],
                        ['events', './data_events.json'], ['emeritus', './data_emeritus.json'],
                        ['coordinators', './data_coordinators.json']
                    ];
                    for(let [key, url] of endpoints) {
                        try { const r = await fetch(url + '?v=' + Date.now()); this[key] = await r.json(); } catch(e) {}
                    }
                    this.coordinators.sort((a,b) => a.order - b.order);
                },
                unlock() { if(this.passInput === 'LCM@2026') { this.maintenanceMode = false; localStorage.setItem('lcm_maint', 'off'); } },
                toggleMaintenance() { this.maintenanceMode = true; localStorage.setItem('lcm_maint', 'on'); },
                getSortedResearchers(category) {
                    return this.allResearchers.filter(r => {
                        let role = (r.role.pt || "").toLowerCase();
                        let isDr = (role.includes("doutor") || role.includes("phd")) && !role.includes("doutorando");
                        return category === 'pleno' ? isDr : !isDr;
                    }).sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
                },
                getResearchersByDomain(domId) { return this.allResearchers.filter(r => r.domain_id === domId).sort((a, b) => a.name.localeCompare(b.name, 'pt-BR')); },
                getStructuredPubs() {
                    const years = [...new Set(this.publications.map(p => p.year))].sort((a, b) => b - a);
                    return years.map(y => ({ year: y, docs: this.publications.filter(p => p.year === y) }));
                },
                getStructuredTheses() {
                    const years = [...new Set(this.theses.map(t => t.year))].sort((a, b) => b - a);
                    return years.map(y => ({ year: y, docs: this.theses.filter(t => t.year === y) }));
                },
                getStructuredEmeritus() {
                    const years = [...new Set(this.emeritus.map(t => t.year))].sort((a, b) => b - a);
                    return years.map(y => ({ year: y, researchers: this.emeritus.filter(t => t.year === y) }));
                },
                getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase(); }
            }
        }
    </script>
</body>
</html>
