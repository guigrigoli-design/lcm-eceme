<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eb-green: #1e3a2c; --eb-gold: #c5a059; }
        .bg-eb-green { background-color: var(--eb-green); }
        .text-eb-green { color: var(--eb-green); }
        .text-eb-gold { color: var(--eb-gold); }
        body { font-family: 'Georgia', serif; }
        [x-cloak] { display: none !important; }
        .year-badge-black { border: 2px solid #000; color: #000; font-weight: bold; padding: 0.2rem 0.8rem; border-radius: 4px; display: inline-block; font-size: 0.75rem; }
        /* Padronização do tamanho do card de perfil */
        .profile-card { width: 100%; max-width: 260px; min-height: 280px; }
        .profile-img { width: 6rem; height: 6rem; object-fit: cover; border-radius: 9999px; }
        .doc-card { border-left: 4px solid var(--eb-green); transition: all 0.3s ease; }
        .doc-card:hover { border-left-color: var(--eb-gold); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen" x-data="appData()" x-init="initApp()">

    <!-- MODAL DE MANUTENÇÃO -->
    <template x-if="maintenanceMode">
        <div class="fixed inset-0 z-[100] bg-eb-green flex flex-col items-center justify-center text-white text-center p-6">
            <img src="brasao-lcm.png" class="h-20 mb-6 bg-white rounded-full p-2">
            <h1 class="text-2xl font-bold uppercase text-eb-gold mb-2">Portal em Atualização</h1>
            <div class="bg-green-900 p-4 rounded border border-eb-gold mt-4">
                <input type="password" x-model="passInput" placeholder="Senha" class="text-gray-900 px-3 py-1 rounded outline-none w-48 text-sm">
                <button @click="unlock()" class="bg-eb-gold text-eb-green px-4 py-1 rounded font-bold ml-2 text-sm">Acessar</button>
            </div>
        </div>
    </template>

    <!-- NAVEGAÇÃO SUPERIOR -->
    <nav class="bg-eb-green text-white border-b-2 border-eb-gold sticky top-0 z-50 shadow-lg" x-show="!maintenanceMode">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'home'">
                <img src="brasao-lcm.png" class="h-10 bg-white rounded-full p-0.5">
                <div class="hidden lg:block leading-none">
                    <span class="block font-bold text-xs uppercase">Laboratório de Ciências Militares</span>
                    <span class="text-[9px] text-eb-gold uppercase tracking-tighter">Escola de Comando e Estado-Maior do Exército</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex space-x-2">
                    <button @click="lang = 'pt'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/br.png" class="h-4 w-6 rounded shadow-sm" title="PT"></button>
                    <button @click="lang = 'en'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/us.png" class="h-4 w-6 rounded shadow-sm" title="EN"></button>
                    <button @click="lang = 'es'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/es.png" class="h-4 w-6 rounded shadow-sm" title="ES"></button>
                </div>
                <button @click="toggleMaintenance()" class="text-eb-gold hover:text-white transition"><i class="fa-solid fa-lock text-sm"></i></button>
                <button class="md:hidden" @click="mobileMenuOpen = !mobileMenuOpen"><i class="fa-solid fa-bars text-xl"></i></button>
            </div>
        </div>
        
        <!-- Menu Principal -->
        <div class="hidden md:flex justify-center bg-green-950/40 py-2 space-x-3 text-[9px] lg:text-[10px] font-bold uppercase tracking-wider border-t border-green-800">
            <template x-for="(label, key) in t[lang].menu" :key="key">
                <button @click="view = key" class="hover:text-eb-gold transition px-2 py-1" :class="view === key ? 'text-eb-gold border-b-2 border-eb-gold' : ''" x-text="label"></button>
            </template>
        </div>
    </nav>

    <main x-show="!maintenanceMode" class="flex-grow">
        
        <!-- HOME -->
        <section x-show="view === 'home'" x-cloak>
            <div class="bg-gray-200 h-[380px] relative overflow-hidden">
                <template x-for="(n, index) in news" :key="index">
                    <div x-show="activeSlide === index" class="absolute inset-0 bg-cover bg-center" :style="`background-image: url('${n.image}')`">
                        <div class="absolute inset-0 bg-black/40 flex flex-col justify-end p-12 text-white">
                            <h2 class="text-2xl font-bold uppercase" x-text="n.title[lang]"></h2>
                            <p class="max-w-2xl text-sm italic opacity-90" x-text="n.desc[lang]"></p>
                        </div>
                    </div>
                </template>
            </div>
            <div class="container mx-auto px-6 py-16 max-w-4xl text-center">
                <h2 class="text-xl font-bold text-eb-green uppercase mb-8 border-b-2 border-eb-gold inline-block pb-1">Apresentação Institucional</h2>
                <div class="text-gray-700 text-base leading-relaxed italic" x-html="introText[lang]"></div>
            </div>
        </section>

        <!-- DOMÍNIOS, COORDENAÇÃO E PESQUISADORES (USANDO MESMO PADRÃO DE CARD) -->
        <section x-show="['domains', 'leadership', 'all_researchers'].includes(view)" x-cloak class="py-12">
            <div class="container mx-auto px-4 max-w-7xl">
                
                <!-- Conteúdo Dinâmico por Aba -->
                <template x-if="view === 'domains'">
                    <div>
                        <template x-for="dom in domains" :key="dom.id">
                            <div class="mb-16">
                                <h3 class="text-lg font-bold text-eb-green uppercase border-l-8 border-eb-gold pl-4 mb-8" x-text="dom.title[lang]"></h3>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                    <template x-for="r in getResearchersByDomain(dom.id)" :key="r.name">
                                        <div class="profile-card bg-white p-6 rounded shadow-sm border-t-4 border-eb-green flex flex-col items-center mx-auto">
                                            <div class="w-24 h-24 mb-4 overflow-hidden border">
                                                <img x-show="r.photo" :src="r.photo" class="profile-img">
                                                <div x-show="!r.photo" class="profile-img flex items-center justify-center bg-eb-green text-white font-bold" x-text="getInitials(r.name)"></div>
                                            </div>
                                            <h4 class="font-bold text-eb-green text-center text-sm mb-1 h-10 flex items-center" x-text="r.name"></h4>
                                            <p class="text-[9px] text-eb-gold font-bold uppercase mb-4 text-center" x-text="r.role[lang]"></p>
                                            <a :href="r.lattes" target="_blank" class="text-[10px] font-bold border-2 border-blue-100 text-blue-800 px-6 py-1 rounded-full hover:bg-blue-50 transition mt-auto">LATTES CV</a>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template x-if="view === 'leadership'">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 justify-items-center">
                        <template x-for="c in coordinators" :key="c.name">
                            <div class="profile-card bg-white p-8 rounded shadow-md border-t-4 border-eb-gold flex flex-col items-center">
                                <div class="w-28 h-28 mb-4 overflow-hidden border-2 border-eb-gold rounded-full">
                                    <img :src="c.photo" class="w-full h-full object-cover">
                                </div>
                                <h4 class="font-bold text-eb-green text-lg text-center h-12 flex items-center" x-text="c.name"></h4>
                                <p class="text-[10px] text-eb-gold font-bold uppercase mt-1 mb-6 text-center" x-text="c.role[lang]"></p>
                                <a :href="c.lattes" target="_blank" class="text-[10px] font-bold border-2 border-eb-gold text-eb-green px-6 py-1.5 rounded-full mt-auto">LATTES CV</a>
                            </div>
                        </template>
                    </div>
                </template>

                <template x-if="view === 'all_researchers'">
                    <div>
                        <div class="mb-16">
                            <h3 class="text-xl font-bold text-eb-green uppercase border-b-2 border-eb-gold pb-2 mb-10"><i class="fa-solid fa-medal text-eb-gold mr-3"></i> Pesquisadores Plenos</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                <template x-for="r in getSortedResearchers('pleno')" :key="r.name">
                                    <div class="profile-card bg-white p-6 rounded shadow-sm border-t-4 border-eb-green flex flex-col items-center mx-auto">
                                        <div class="w-24 h-24 mb-4 overflow-hidden border">
                                            <img x-show="r.photo" :src="r.photo" class="profile-img">
                                            <div x-show="!r.photo" class="profile-img flex items-center justify-center bg-eb-green text-white font-bold" x-text="getInitials(r.name)"></div>
                                        </div>
                                        <h4 class="font-bold text-eb-green text-center text-sm mb-1 h-10 flex items-center" x-text="r.name"></h4>
                                        <p class="text-[9px] text-eb-gold font-bold uppercase mb-4 text-center" x-text="r.role[lang]"></p>
                                        <a :href="r.lattes" target="_blank" class="text-[10px] font-bold border-2 border-blue-100 text-blue-800 px-6 py-1 rounded-full mt-auto">LATTES CV</a>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- NCNP (COORDENAÇÃO E INTEGRANTES PADRONIZADOS) -->
        <section x-show="view === 'ncnp'" x-cloak class="py-12 bg-white">
            <div class="container mx-auto px-4 max-w-6xl">
                <div class="flex justify-center space-x-3 mb-12">
                    <button @click="ncnpTab = 'coords'" class="px-6 py-2 rounded text-[10px] font-bold uppercase border transition" :class="ncnpTab === 'coords' ? 'bg-eb-green text-white' : 'bg-gray-50'">Coordenação</button>
                    <button @click="ncnpTab = 'students'" class="px-6 py-2 rounded text-[10px] font-bold uppercase border transition" :class="ncnpTab === 'students' ? 'bg-eb-green text-white' : 'bg-gray-50'">Integrantes</button>
                </div>
                
                <div class="bg-gray-50 p-10 rounded border shadow-inner">
                    <template x-if="ncnpTab === 'coords'">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 justify-items-center">
                            <template x-for="c in ic.coords" :key="c.name">
                                <div class="profile-card bg-white p-6 rounded shadow border-t-4 border-blue-800 flex flex-col items-center">
                                    <div class="w-20 h-20 mb-3 overflow-hidden border rounded-full">
                                        <img x-show="c.photo" :src="c.photo" class="w-full h-full object-cover">
                                    </div>
                                    <h4 class="font-bold text-eb-green text-sm text-center" x-text="c.name"></h4>
                                    <p class="text-[9px] text-eb-gold font-bold uppercase mt-1 mb-4 text-center" x-text="c.role[lang]"></p>
                                    <a :href="c.lattes" target="_blank" class="text-[10px] font-bold text-blue-800 mt-auto border px-4 py-1 rounded-full">LATTES CV</a>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="ncnpTab === 'students'">
                        <div>
                            <template x-for="group in getStructuredIcStudents()" :key="group.year">
                                <div class="mb-12">
                                    <h5 class="text-xs font-bold text-eb-green border-b pb-2 mb-8" x-text="'Turma ' + group.year"></h5>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 justify-items-center">
                                        <template x-for="s in group.students" :key="s.name">
                                            <div class="profile-card bg-white p-5 rounded shadow-sm border-t-4 border-gray-300 flex flex-col items-center">
                                                <div class="w-16 h-16 mb-3 overflow-hidden border rounded-full">
                                                    <img x-show="s.photo" :src="s.photo" class="w-full h-full object-cover">
                                                    <div x-show="!s.photo" class="w-full h-full flex items-center justify-center bg-gray-200 text-gray-500 font-bold text-xs" x-text="getInitials(s.name)"></div>
                                                </div>
                                                <h4 class="font-bold text-eb-green text-[11px] text-center h-8 flex items-center" x-text="s.name"></h4>
                                                <a :href="s.lattes" target="_blank" class="text-[9px] font-bold text-blue-800 mt-auto border px-3 py-0.5 rounded-full">LATTES</a>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- DOCUMENTOS: TESES E PRODUÇÃO ACADÊMICA (PADRÃO UNIFICADO) -->
        <section x-show="['theses', 'publications'].includes(view)" x-cloak class="py-12 bg-gray-50">
            <div class="container mx-auto px-4 max-w-5xl">
                <h2 class="text-2xl font-bold text-eb-green uppercase text-center mb-12" x-text="t[lang].menu[view]"></h2>
                
                <template x-if="view === 'theses'">
                    <template x-for="group in getStructuredTheses()" :key="group.year">
                        <div class="mb-12">
                            <div class="flex items-center mb-6">
                                <span class="year-badge-black" x-text="group.year"></span>
                                <div class="h-px bg-gray-200 flex-grow ml-4"></div>
                            </div>
                            <div class="space-y-4">
                                <template x-for="doc in group.docs">
                                    <div class="doc-card bg-white p-5 rounded shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center">
                                        <div class="flex-grow pr-6">
                                            <h4 class="font-bold text-eb-green text-sm" x-text="doc.title"></h4>
                                            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1" x-text="doc.type"></p>
                                            <p class="text-[11px] text-gray-600 italic mt-1" x-text="doc.researcher"></p>
                                        </div>
                                        <a :href="doc.file_link" target="_blank" class="bg-eb-green text-white text-[10px] font-bold px-5 py-2 rounded mt-4 md:mt-0 flex items-center shrink-0">
                                            <i class="fa-solid fa-file-pdf mr-2"></i> ACESSAR
                                        </a>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </template>

                <template x-if="view === 'publications'">
                    <template x-for="group in getStructuredPubs()" :key="group.year">
                        <div class="mb-12">
                            <div class="flex items-center mb-6">
                                <span class="bg-eb-gold text-eb-green font-bold text-[10px] px-4 py-1 rounded shadow-sm" x-text="group.year"></span>
                                <div class="h-px bg-gray-200 flex-grow ml-4"></div>
                            </div>
                            <div class="space-y-4">
                                <template x-for="p in group.docs" :key="p.title">
                                    <div class="doc-card bg-white p-5 rounded shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center">
                                        <div class="flex-grow pr-6">
                                            <h4 class="font-bold text-eb-green text-sm" x-text="p.title"></h4>
                                            <p class="text-[10px] text-gray-600 mt-1 font-bold" x-text="p.authors"></p>
                                            <p class="text-[9px] text-gray-400 italic mt-1" x-text="p.journal"></p>
                                        </div>
                                        <a :href="p.link" target="_blank" class="bg-red-700 text-white text-[10px] font-bold px-5 py-2 rounded mt-4 md:mt-0 flex items-center shrink-0">
                                            <i class="fa-solid fa-file-pdf mr-2"></i> PDF
                                        </a>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="bg-eb-green text-white py-12 border-t-8 border-eb-gold" x-show="!maintenanceMode">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left text-[10px] opacity-60">
                <p class="font-bold uppercase tracking-widest">LCM - Laboratório de Ciências Militares</p>
                <p>Escola de Comando e Estado-Maior do Exército</p>
                <p class="mt-4">© 2026 PPGCM / ECEME</p>
            </div>
            <img src="https://api.visitorbadge.io/api/visitors?path=lcm-eceme.github.io&label=VISITAS&labelColor=%231e3a2c&countColor=%23c5a059&style=flat" class="my-6 md:my-0" />
            <div class="flex space-x-5 text-xl">
                <a href="https://www.linkedin.com/company/lcmeceme/" target="_blank" class="hover:text-eb-gold transition"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://www.instagram.com/lcmeceme/" target="_blank" class="hover:text-eb-gold transition"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script>
        function appData() {
            return {
                lang: 'pt', view: 'home', maintenanceMode: false, passInput: '',
                activeSlide: 0, mobileMenuOpen: false, ncnpTab: 'coords',
                allResearchers: [], theses: [], publications: [], news: [], ic: {}, coordinators: [], introText: {},
                domains: [
                    { id: 1, title: { pt: "Domínio 1 - Ciência, Tecnologia e Inovação em Defesa", en: "Defense S&T", es: "Dominio 1 - CT&I" } },
                    { id: 2, title: { pt: "Domínio 2 - Preparo e Emprego do Poder Militar", en: "Readiness", es: "Dominio 2 - Preparación" } },
                    { id: 3, title: { pt: "Domínio 3 - Análise e Prospecção do Ambiente Estratégico", en: "Analysis", es: "Dominio 3 - Análisis" } }
                ],
                t: {
                    pt: { menu: { home: 'Início', domains: 'Domínios', leadership: 'Coordenação', all_researchers: 'Pesquisadores', ncnp: 'NCNP', theses: 'Teses/Dissertações/TCC', publications: 'Produção Acadêmica', events: 'Eventos', contact: 'Contato' } },
                    en: { menu: { home: 'Home', domains: 'Domains', leadership: 'Leadership', all_researchers: 'Researchers', ncnp: 'NCNP', theses: 'Theses/Dissertations', publications: 'Academic Production', events: 'Events', contact: 'Contact' } },
                    es: { menu: { home: 'Inicio', domains: 'Dominios', leadership: 'Coordinación', all_researchers: 'Investigadores', ncnp: 'NCNP', theses: 'Tesis', publications: 'Producción Académica', events: 'Eventos', contact: 'Contacto' } }
                },
                async initApp() {
                    await this.loadAll();
                    if(localStorage.getItem('lcm_maint') === 'on') this.maintenanceMode = true;
                    setInterval(() => { this.activeSlide = (this.activeSlide + 1) % (this.news.length || 1); }, 6000);
                },
                async loadAll() {
                    const files = [['allResearchers', './data_researchers.json'], ['theses', './data_theses.json'], ['publications', './data_publications.json'], ['news', './data_news.json'], ['ic', './data_ic.json'], ['coordinators', './data_coordinators.json'], ['introText', './data_intro.json']];
                    for(let [key, url] of files) {
                        try { const r = await fetch(url + '?v=' + Date.now()); this[key] = await r.json(); } catch(e) {}
                    }
                },
                unlock() { if(this.passInput === 'LCM@2026') { this.maintenanceMode = false; localStorage.setItem('lcm_maint', 'off'); } },
                toggleMaintenance() { this.maintenanceMode = true; localStorage.setItem('lcm_maint', 'on'); },
                getSortedResearchers(cat) { return this.allResearchers.filter(r => {
                    let role = (r.role.pt || "").toLowerCase();
                    let isDr = (role.includes("doutor") || role.includes("phd")) && !role.includes("doutorando");
                    return cat === 'pleno' ? isDr : !isDr;
                }).sort((a,b) => a.name.localeCompare(b.name, 'pt-BR')); },
                getResearchersByDomain(id) { return this.allResearchers.filter(r => r.domain_id === id).sort((a,b) => a.name.localeCompare(b.name, 'pt-BR')); },
                getStructuredPubs() {
                    const years = [...new Set(this.publications.map(p => p.year))].sort((a,b) => b - a);
                    return years.map(y => ({ year: y, docs: this.publications.filter(p => p.year === y) }));
                },
                getStructuredTheses() {
                    const years = [...new Set(this.theses.map(t => t.year))].sort((a,b) => b - a);
                    return years.map(y => ({ year: y, docs: this.theses.filter(t => t.year === y) }));
                },
                getStructuredIcStudents() {
                    if(!this.ic.students) return [];
                    const years = [...new Set(this.ic.students.map(s => s.year))].sort((a,b) => b - a);
                    return years.map(y => ({ year: y, students: this.ic.students.filter(s => s.year === y) }));
                },
                getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase(); }
            }
        }
    </script>
</body>
</html>
