<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eb-green: #1e3a2c; --eb-gold: #c5a059; }
        [x-cloak] { display: none !important; }
        body { font-family: 'Georgia', serif; scroll-behavior: smooth; background-color: #f1f5f9; }
        
        /* Contêiner para Imagens de Alta Resolução (2K) */
        .domain-hero-frame { 
            width: 100%; 
            height: 400px; 
            background-color: #cbd5e1; 
            overflow: hidden; 
            position: relative;
            border-bottom: 6px solid var(--eb-gold);
            display: block;
        }
        .domain-hero-frame img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.5s ease-in;
        }

        .circle-container { width: 7.5rem; height: 7.5rem; border-radius: 9999px; overflow: hidden; border: 3px solid var(--eb-gold); display: flex; align-items: center; justify-content: center; background-color: #fff; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .circle-img { width: 100%; height: 100%; object-fit: cover; }
        
        .tab-active { border-bottom: 4px solid var(--eb-gold); color: var(--eb-gold) !important; font-weight: bold; }
        .bg-dom-1 { border-left: 12px solid #0369a1; }
        .bg-dom-2 { border-left: 12px solid #15803d; }
        .bg-dom-3 { border-left: 12px solid #c2410c; }
    </style>
</head>
<body class="flex flex-col min-h-screen" x-data="lcmApp()" x-init="init()">
    <nav class="bg-[#1e3a2c] text-white border-b-2 border-[#c5a059] sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'home'">
                <img src="brasao-lcm.png" class="h-10 bg-white rounded-full p-0.5">
                <div class="hidden lg:block leading-none">
                    <span class="block font-bold text-xs uppercase tracking-tight">Laboratório de Ciências Militares</span>
                    <span class="text-[9px] text-[#c5a059] uppercase">Escola de Comando e Estado-Maior do Exército</span>
                </div>
            </div>
            <div class="flex bg-black/40 p-1.5 rounded-lg border border-white/10 space-x-2">
                <button @click="lang = 'pt'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/br.png" class="h-4 w-6 rounded shadow"></button>
                <button @click="lang = 'en'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/us.png" class="h-4 w-6 rounded shadow"></button>
                <button @click="lang = 'es'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/es.png" class="h-4 w-6 rounded shadow"></button>
            </div>
        </div>
        <div class="hidden md:flex justify-center bg-black/30 py-2.5 space-x-1 lg:space-x-2 text-[8px] lg:text-[9.2px] font-bold uppercase border-t border-green-900 overflow-x-auto shadow-inner">
            <template x-for="(label, key) in menuLabels[lang]" :key="key">
                <button @click="view = key" class="px-2 py-1 transition hover:text-[#c5a059] whitespace-nowrap" :class="view === key ? 'tab-active' : 'text-gray-300'" x-text="label"></button>
            </template>
            <button @click="isLoggedIn ? view = 'researcher_area' : view = 'researcher_login'" class="bg-[#c5a059] text-[#1e3a2c] px-4 py-1.5 rounded ml-4 font-bold hover:bg-yellow-600 transition shadow-lg whitespace-nowrap" x-text="uiLabels[lang]?.researcherArea || '...'"></button>
        </div>
    </nav>

    <main class="flex-grow">
        <div x-html="renderCurrentView()" x-cloak></div>
        <div x-show="loading" class="flex flex-col items-center justify-center p-32">
            <i class="fa-solid fa-spinner fa-spin text-5xl text-[#1e3a2c] mb-6"></i>
            <p class="text-xs font-bold uppercase tracking-[0.3em] text-gray-400" x-text="uiLabels[lang]?.loading || 'Sincronizando...'"></p>
        </div>
    </main>

    <footer class="bg-[#1e3a2c] text-white py-12 border-t-8 border-[#c5a059] mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="opacity-40 text-[10px] uppercase font-bold tracking-widest">Laboratório de Ciências Militares - ECEME | 2026</p>
        </div>
    </footer>

    <script src="js/menu_views.js"></script>
    <script src="js/researcher_logic.js"></script>
    <script src="js/app_core.js"></script>
</body>
</html>
