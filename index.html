<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eb-green: #1e3a2c; --eb-gold: #c5a059; }
        [x-cloak] { display: none !important; }
        body { font-family: 'Georgia', serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid var(--eb-gold); color: var(--eb-gold) !important; font-weight: bold; }
        .circle-container { width: 7.5rem; height: 7.5rem; border-radius: 9999px; overflow: hidden; border: 3px solid var(--eb-gold); display: flex; align-items: center; justify-content: center; background-color: #fff; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .circle-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="flex flex-col min-h-screen" x-data="lcmApp()" x-init="init()">
    <nav class="bg-[#1e3a2c] text-white border-b-2 border-[#c5a059] sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'home'">
                <img src="brasao-lcm.png" class="h-10 bg-white rounded-full p-0.5">
                <div class="hidden lg:block leading-none">
                    <span class="block font-bold text-xs uppercase">Laboratório de Ciências Militares</span>
                    <span class="text-[9px] text-[#c5a059] uppercase italic">Escola de Comando e Estado-Maior do Exército</span>
                </div>
            </div>
            <div class="flex space-x-2 bg-black/30 p-1.5 rounded-lg">
                <button @click="setLang('pt')"><img src="https://flagcdn.com/w40/br.png" class="h-4 w-6 rounded shadow"></button>
                <button @click="setLang('en')"><img src="https://flagcdn.com/w40/us.png" class="h-4 w-6 rounded shadow"></button>
                <button @click="setLang('es')"><img src="https://flagcdn.com/w40/es.png" class="h-4 w-6 rounded shadow"></button>
            </div>
        </div>
        <div class="hidden md:flex justify-center bg-black/20 py-2 space-x-2 text-[9px] font-bold uppercase border-t border-green-900">
            <template x-for="(label, key) in menuLabels[lang]" :key="key">
                <button @click="view = key" class="px-2 py-1 transition hover:text-[#c5a059]" :class="view === key ? 'tab-active' : ''" x-text="label"></button>
            </template>
            <button @click="isLoggedIn ? view = 'researcher_area' : view = 'researcher_login'" class="bg-[#c5a059] text-[#1e3a2c] px-3 py-1 rounded ml-2 font-bold" x-text="uiLabels[lang]?.researcherArea || '...'"></button>
        </div>
    </nav>

    <main class="flex-grow">
        <div x-html="renderCurrentView()" x-cloak></div>
        <div x-show="loading" class="flex flex-col items-center justify-center p-32">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-[#1e3a2c] mb-4"></i>
            <p class="text-xs font-bold uppercase tracking-widest text-gray-400">Carregando Arquitetura Modular...</p>
        </div>
    </main>

    <footer class="bg-[#1e3a2c] text-white py-12 border-t-8 border-[#c5a059] mt-auto text-center opacity-40 text-[10px] uppercase font-bold tracking-widest">
        Laboratório de Ciências Militares - ECEME | 2026
    </footer>

    <script src="js/modules/view_home.js"></script>
    <script src="js/modules/view_domains.js"></script>
    <script src="js/modules/view_leadership.js"></script>
    <script src="js/modules/view_researchers.js"></script>
    <script src="js/modules/view_cnp.js"></script>
    <script src="js/modules/view_theses.js"></script>
    <script src="js/modules/view_publications.js"></script>
    <script src="js/modules/view_events.js"></script>
    <script src="js/modules/view_contact.js"></script>
    <script src="js/modules/view_researcher_area.js"></script>
    <script src="js/app_core.js"></script>
</body>
</html>
