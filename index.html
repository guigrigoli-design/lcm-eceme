<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> <!-- Estilos consolidados -->
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen" x-data="lcmApp()" x-init="init()">

    <!-- NAVEGAÇÃO SUPERIOR -->
    <nav class="bg-[#1e3a2c] text-white border-b-2 border-[#c5a059] sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" @click="setView('home')">
                <img src="brasao-lcm.png" class="h-10 bg-white rounded-full p-0.5 shadow-md">
                <div class="hidden lg:block leading-none">
                    <span class="block font-bold text-xs uppercase">Laboratório de Ciências Militares</span>
                    <span class="text-[9px] text-[#c5a059] uppercase tracking-tighter">Escola de Comando e Estado-Maior do Exército</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex space-x-2">
                    <button @click="lang = 'pt'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/br.png" class="h-4 w-6 rounded"></button>
                    <button @click="lang = 'en'" class="hover:scale-110 transition"><img src="https://flagcdn.com/w40/us.png" class="h-4 w-6 rounded"></button>
                </div>
                <button class="md:hidden" @click="mobileMenuOpen = !mobileMenuOpen"><i class="fa-solid fa-bars text-xl"></i></button>
            </div>
        </div>
        
        <!-- LINKS DE MENU (Conectados às Views) -->
        <div class="hidden md:flex justify-center bg-black/20 py-2 space-x-2 text-[8px] lg:text-[9.5px] font-bold uppercase tracking-wider border-t border-green-800">
            <template x-for="(label, key) in menuLabels[lang]" :key="key">
                <button @click="setView(key)" class="hover:text-[#c5a059] transition px-2 py-1" :class="view === key ? 'text-[#c5a059] border-b border-[#c5a059]' : ''" x-text="label"></button>
            </template>
            <button @click="handleResearcherAreaAccess()" class="bg-[#c5a059] text-[#1e3a2c] px-3 py-1 rounded ml-2 hover:bg-yellow-600 transition" x-text="isLoggedIn ? 'Minha Área' : 'Área do Pesquisador'"></button>
        </div>
    </nav>

    <!-- CONTEÚDO DINÂMICO (Injetado via JavaScript) -->
    <main class="flex-grow">
        <div id="main-content" x-html="renderView()"></div>
    </main>

    <!-- RODAPÉ -->
    <footer class="bg-[#1e3a2c] text-white py-10 border-t-4 border-[#c5a059]">
        <div class="container mx-auto px-4 text-center opacity-60 text-[10px] uppercase tracking-widest">
            Laboratório de Ciências Militares - ECEME | 2026
        </div>
    </footer>

    <!-- Scripts Modulares -->
    <script src="js/views.js"></script>
    <script src="js/researcher_area.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
