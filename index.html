<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM - Laboratório de Ciências Militares | ECEME</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --eb-green: #1e3a2c; 
            --eb-gold: #c5a059; 
        }

        [x-cloak] { display: none !important; }
        
        body { 
            font-family: 'Georgia', serif; 
            scroll-behavior: smooth; 
        }

        /* Configuração Visual dos Integrantes (Aba Integrantes) */
        .circle-container { 
            width: 7.5rem; 
            height: 7.5rem; 
            border-radius: 9999px; 
            overflow: hidden; 
            border: 3px solid var(--eb-gold); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #f3f4f6; 
            margin-bottom: 1rem; 
            transition: transform 0.3s;
        }
        
        .circle-container:hover {
            transform: scale(1.05);
        }

        .circle-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* Identidade Visual de Projetos por Domínio (Área do Pesquisador) */
        /* Domínio 1: Sustentação em Defesa (Azul) */
        .bg-dom-1 { 
            background-color: #e0f2fe !important; 
            border-left: 8px solid #0369a1; 
        } 
        
        /* Domínio 2: Preparo e Emprego (Verde) */
        .bg-dom-2 { 
            background-color: #f0fdf4 !important; 
            border-left: 8px solid #15803d; 
        } 
        
        /* Domínio 3: Ambiente Estratégico (Laranja) */
        .bg-dom-3 { 
            background-color: #fff7ed !important; 
            border-left: 8px solid #c2410c; 
        } 
        
        /* Elementos de Interface */
        .year-badge { 
            font-weight: bold; 
            padding: 0.2rem 0.8rem; 
            border-radius: 4px; 
            font-size: 0.7rem; 
        }

        .tab-active { 
            border-bottom: 3px solid var(--eb-gold); 
            color: var(--eb-gold) !important; 
            font-weight: bold; 
        }

        /* Ajustes de Responsividade para o Menu */
        .menu-btn {
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen" x-data="lcmApp()" x-init="init()">

    <!-- BARRA DE NAVEGAÇÃO SUPERIOR -->
    <nav class="bg-[#1e3a2c] text-white border-b-2 border-[#c5a059] sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <!-- Logotipo e Título Institucional -->
            <div class="flex items-center space-x-3 cursor-pointer" @click="view = 'home'">
                <img src="brasao-lcm.png" class="h-10 bg-white rounded-full p-0.5 shadow-md" alt="Brasão LCM">
                <div class="hidden lg:block leading-none">
                    <span class="block font-bold text-xs uppercase tracking-tight">Laboratório de Ciências Militares</span>
                    <span class="text-[9px] text-[#c5a059] uppercase tracking-tighter">Escola de Comando e Estado-Maior do Exército</span>
                </div>
            </div>
            
            <!-- Seleção de Idioma e Menu Mobile -->
            <div class="flex space-x-4 items-center">
                <div class="flex space-x-2">
                    <button @click="lang = 'pt'" class="hover:scale-110 transition shadow-sm">
                        <img src="https://flagcdn.com/w40/br.png" class="h-4 w-6 rounded" title="Português">
                    </button>
                    <button @click="lang = 'en'" class="hover:scale-110 transition shadow-sm">
                        <img src="https://flagcdn.com/w40/us.png" class="h-4 w-6 rounded" title="English">
                    </button>
                    <button @click="lang = 'es'" class="hover:scale-110 transition shadow-sm">
                        <img src="https://flagcdn.com/w40/es.png" class="h-4 w-6 rounded" title="Español">
                    </button>
                </div>
                <button class="md:hidden p-2" @click="mobileMenuOpen = !mobileMenuOpen">
                    <i class="fa-solid" :class="mobileMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
                </button>
            </div>
        </div>

        <!-- MENU DE NAVEGAÇÃO DESKTOP -->
        <div class="hidden md:flex justify-center bg-black/20 py-2 space-x-1 lg:space-x-2 text-[7.5px] lg:text-[9.2px] font-bold border-t border-green-800 overflow-x-auto">
            <template x-for="(label, key) in menuLabels[lang]" :key="key">
                <button @click="view = key" 
                        class="menu-btn px-2 py-1 transition whitespace-nowrap hover:text-[#c5a059]" 
                        :class="view === key ? 'tab-active' : ''" 
                        x-text="label">
                </button>
            </template>
            
            <!-- ACESSO RESTRITO (Botão Único de Entrada) -->
            <button @click="isLoggedIn ? view = 'researcher_area' : view = 'researcher_login'" 
                    class="bg-[#c5a059] text-[#1e3a2c] px-3 py-1 rounded ml-2 font-bold whitespace-nowrap hover:bg-yellow-600 transition shadow-md" 
                    x-text="isLoggedIn ? (lang === 'pt' ? 'Minha Área' : (lang === 'en' ? 'My Area' : 'Minha Área')) : (lang === 'pt' ? 'Área do Pesquisador' : (lang === 'en' ? 'Researcher Area' : 'Área del Investigador'))">
            </button>
        </div>

        <!-- MENU MOBILE (Expandível) -->
        <div x-show="mobileMenuOpen" x-transition class="md:hidden bg-[#1e3a2c] border-t border-green-800 p-4 space-y-2 font-bold uppercase text-[10px]">
            <template x-for="(label, key) in menuLabels[lang]" :key="key">
                <button @click="view = key; mobileMenuOpen = false" class="block w-full text-left py-2 border-b border-green-900/50" x-text="label"></button>
            </template>
            <button @click="isLoggedIn ? view = 'researcher_area' : view = 'researcher_login'; mobileMenuOpen = false" 
                    class="block w-full text-left py-2 text-[#c5a059]" 
                    x-text="lang === 'pt' ? 'Área do Pesquisador' : 'Researcher Area'"></button>
        </div>
    </nav>

    <!-- ÁREA PRINCIPAL DE CONTEÚDO DINÂMICO -->
    <main class="flex-grow relative">
        <!-- Renderização via Roteador AlpineJS -->
        <div x-html="renderCurrentView()" x-cloak></div>
        
        <!-- Feedback de Carregamento -->
        <div x-show="loading" class="flex flex-col items-center justify-center p-20 absolute inset-0 bg-gray-50 z-10">
            <i class="fa-solid fa-spinner fa-spin text-3xl text-[#1e3a2c] mb-4"></i>
            <p class="text-xs font-bold uppercase tracking-widest text-gray-400">Processando Inteligência LCM...</p>
        </div>
    </main>

    <!-- RODAPÉ INSTITUCIONAL -->
    <footer class="bg-[#1e3a2c] text-white py-12 border-t-8 border-[#c5a059] mt-auto shadow-inner">
        <div class="container mx-auto px-4 text-center">
            <img src="brasao-lcm.png" class="h-12 mx-auto mb-4 opacity-50 grayscale">
            <p class="opacity-60 text-[10px] uppercase tracking-widest leading-relaxed">
                Laboratório de Ciências Militares (LCM)<br>
                Escola de Comando e Estado-Maior do Exército (ECEME)<br>
                Programa de Pós-Graduação em Ciências Militares (PPGCM)<br>
                Rio de Janeiro, RJ - 2026
            </p>
        </div>
    </footer>

    <!-- CARREGAMENTO DOS MÓDULOS JS -->
    <script src="js/menu_views.js"></script>
    <script src="js/researcher_logic.js"></script>
    <script src="js/app_core.js"></script>
</body>
</html>
